<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | NAVI EEE Portfolio</title>
    <!-- Import Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Import Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Import Google Fonts: Bangers (Comic Title), Space Grotesk (Headers), Inter (Body) -->
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@400;600&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        heading: ['Space Grotesk', 'sans-serif'],
                        comic: ['Bangers', 'cursive'],
                    },
                    colors: {
                        'crimson-red': '#dc2626',
                        'dark-red': '#7f1d1d',
                        'dark-bg': '#0a0a0a',
                        'panel-bg': '#121212',
                        'comic-yellow': '#facc15',
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #0a0a0a;
            color: #e2e8f0;
            overflow-x: hidden;
        }

        /* Comic Book Halftone Background */
        .halftone-body {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            background-color: #0a0a0a;
            background-image: radial-gradient(rgba(220, 38, 38, 0.15) 1.5px, transparent 1.5px);
            background-size: 16px 16px;
        }

        /* Markdown Styling inside the Blog Post */
        .markdown-content h1, .markdown-content h2, .markdown-content h3 {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            color: #ffffff;
            text-transform: uppercase;
            margin-top: 2.5rem;
            margin-bottom: 1rem;
            border-bottom: 3px solid #dc2626;
            padding-bottom: 0.5rem;
        }
        .markdown-content h1 { font-size: 2.5rem; }
        .markdown-content h2 { font-size: 2rem; color: #facc15; }
        .markdown-content h3 { font-size: 1.5rem; }
        
        .markdown-content p {
            font-family: 'Inter', sans-serif;
            font-size: 1.125rem;
            line-height: 1.75;
            margin-bottom: 1.5rem;
            color: #d1d5db;
        }

        .markdown-content ul {
            list-style-type: square;
            margin-left: 1.5rem;
            margin-bottom: 1.5rem;
            color: #facc15;
        }
        
        .markdown-content li {
            margin-bottom: 0.5rem;
            color: #e2e8f0;
            font-size: 1.125rem;
        }

        .markdown-content img {
            border: 4px solid #ffffff;
            box-shadow: 8px 8px 0px #dc2626;
            margin: 2rem auto;
            max-width: 100%;
            height: auto;
        }

        .markdown-content pre {
            background-color: #121212;
            border: 2px solid #dc2626;
            padding: 1.5rem;
            overflow-x: auto;
            margin-bottom: 1.5rem;
            box-shadow: 6px 6px 0px #000000;
        }

        .markdown-content code {
            font-family: monospace;
            color: #facc15;
            background-color: rgba(255, 255, 255, 0.1);
            padding: 0.2rem 0.4rem;
            border-radius: 0.25rem;
        }

        .markdown-content pre code {
            background-color: transparent;
            padding: 0;
            color: #e2e8f0;
        }
    </style>
</head>

<body class="antialiased min-h-screen relative overflow-x-hidden">
    <!-- Comic Halftone Background -->
    <div class="halftone-body"></div>

    <!-- Navigation Bar (Fixed at top) -->
    <nav class="fixed top-0 left-0 w-full z-50 bg-[#0a0a0a] border-b-4 border-crimson-red shadow-[0_4px_0_#7f1d1d]">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-20">
                <a href="/" class="text-4xl font-comic text-white tracking-widest hover:text-crimson-red transition-colors" style="-webkit-text-stroke: 1px #dc2626; text-shadow: 2px 2px 0 #7f1d1d;">
                    NAVI
                </a>
                <a href="/#projects" class="px-4 py-2 bg-crimson-red text-white border-2 border-white font-heading font-bold uppercase text-sm hover:bg-white hover:text-black hover:border-black transition-colors shadow-[3px_3px_0_#000]">
                    <i class="fas fa-arrow-left mr-2"></i> Back to Issues
                </a>
            </div>
        </div>
    </nav>

    <!-- Main Article Container (Notice pt-32 pushing content below navbar!) -->
    <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 pt-32 pb-24 relative z-10">
        <!-- Comic Book Panel Frame -->
        <article class="bg-[#121212] border-4 border-white p-6 sm:p-12 shadow-[12px_12px_0_#dc2626] relative">
            
            <!-- Header Section -->
            <header class="border-b-4 border-crimson-red pb-8 mb-8">
                <div class="inline-block bg-comic-yellow text-black font-comic px-3 py-1 text-lg mb-4 transform -skew-x-6 border-2 border-black shadow-[2px_2px_0_#000]">
                    ISSUE CASE STUDY
                </div>
                <h1 class="text-4xl sm:text-6xl font-heading font-bold text-white uppercase tracking-wide leading-tight mb-4" style="text-shadow: 3px 3px 0 #dc2626;">
                    {{ page.title }}
                </h1>
                <p class="text-gray-400 font-heading font-semibold text-lg">
                    <i class="far fa-calendar-alt text-crimson-red mr-2"></i> {{ page.date | date: "%B %d, %Y" }}
                </p>
            </header>

            <!-- Markdown Body Content -->
            <div class="markdown-content">
                {{ content }}
            </div>

            <!-- Footer Navigation Inside Panel -->
            <div class="mt-16 pt-8 border-t-2 border-gray-800 flex justify-between items-center">
                <a href="/#projects" class="text-comic-yellow hover:text-white font-heading font-bold uppercase tracking-wider text-lg transition-colors">
                    <i class="fas fa-long-arrow-alt-left mr-2"></i> Return to Main Grid
                </a>
                <span class="font-comic text-gray-500 text-xl tracking-widest">NAVI // EEE LABS</span>
            </div>
        </article>
    </main>

    <footer class="py-8 bg-[#0a0a0a] text-center relative z-10 border-t-8 border-crimson-red">
        <p class="font-heading font-bold text-white uppercase tracking-widest text-sm">
            &copy; 2026 Navi. Designed for engineering action.
        </p>
    </footer>
</body>
</html>
