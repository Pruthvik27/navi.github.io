<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | NAVI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@400;600&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0a0a0a; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .comic-bg {
            background-color: #0a0a0a;
            background-image: radial-gradient(rgba(220, 38, 38, 0.15) 1.5px, transparent 1.5px);
            background-size: 16px 16px;
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1;
        }
        /* Markdown Styling (Since markdown generates plain tags like <h1>, <p>, <img>) */
        .markdown-content h1 { font-family: 'Bangers', cursive; color: white; font-size: 3rem; text-shadow: 3px 3px 0 #dc2626; margin-bottom: 1rem; margin-top: 2rem; }
        .markdown-content h2 { font-family: 'Space Grotesk', sans-serif; color: #facc15; font-size: 2rem; border-bottom: 4px solid #dc2626; padding-bottom: 0.5rem; margin-top: 2rem; margin-bottom: 1rem; }
        .markdown-content p { margin-bottom: 1.5rem; line-height: 1.8; font-size: 1.125rem; }
        .markdown-content img { border: 4px solid white; box-shadow: 8px 8px 0px #dc2626; max-width: 100%; height: auto; margin: 2rem auto; display: block; }
        .markdown-content pre { background: #121212; border: 2px solid #dc2626; padding: 1rem; overflow-x: auto; margin-bottom: 1.5rem; }
        .markdown-content code { color: #facc15; font-family: monospace; }
        .markdown-content ul { list-style-type: square; margin-left: 2rem; margin-bottom: 1.5rem; color: #facc15;}
        .markdown-content li { color: #e2e8f0; margin-bottom: 0.5rem; }
    </style>
</head>
<body class="antialiased min-h-screen relative overflow-x-hidden">
    <div class="comic-bg"></div>
    
    <!-- Minimal Nav -->
    <nav class="bg-dark-bg/95 border-b-4 border-red-600 shadow-[0_4px_0_#7f1d1d] p-4 sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <a href="/" class="text-4xl font-comic text-white" style="font-family: 'Bangers'; -webkit-text-stroke: 1px #dc2626; text-shadow: 2px 2px 0 #7f1d1d;">NAVI</a>
            <a href="/#projects" class="text-white hover:text-yellow-400 font-bold" style="font-family: 'Space Grotesk';">BACK TO ISSUES</a>
        </div>
    </nav>

    <!-- Post Content Container -->
    <main class="max-w-4xl mx-auto px-4 py-12 relative z-10">
        <article class="bg-black border-4 border-white p-8 md:p-12 shadow-[12px_12px_0_#dc2626] markdown-content">
            <!-- This is where Jekyll injects your markdown text! -->
            {{ content }}
        </article>
    </main>
</body>
</html>
